<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watchdog Alert</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f4f7fb;
        color: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      .wrap {
        max-width: 640px;
        margin: 24px auto;
        border: 1px solid #dbe3ef;
        background: #ffffff;
        border-radius: 12px;
        overflow: hidden;
      }
      .top {
        padding: 14px 18px;
        color: #ffffff;
        background: $status_color;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      .body {
        padding: 18px;
      }
      .title {
        margin: 0 0 10px 0;
        font-size: 18px;
        line-height: 1.35;
      }
      .chips {
        margin: 0 0 14px 0;
      }
      .chip {
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 999px;
        margin-right: 6px;
        margin-bottom: 6px;
        color: #ffffff;
        background: $status_color;
      }
      .section {
        margin-top: 14px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        overflow: hidden;
      }
      .section h3 {
        margin: 0;
        padding: 9px 12px;
        font-size: 13px;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      td {
        padding: 8px 12px;
        border-bottom: 1px solid #eef2f7;
        font-size: 13px;
        vertical-align: top;
      }
      tr:last-child td {
        border-bottom: 0;
      }
      td.k {
        width: 34%;
        color: #475569;
        font-weight: 600;
      }
      td.v {
        color: #0f172a;
      }
      .text {
        font-size: 14px;
        line-height: 1.5;
        margin: 0;
      }
      .footer {
        border-top: 1px solid #e2e8f0;
        color: #64748b;
        font-size: 11px;
        padding: 10px 18px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">WATCHDOG ALERT</div>
      <div class="body">
        <h1 class="title">$alert_name</h1>
        <p class="chips">
          <span class="chip">$status_text</span>
          <span class="chip">$severity_text</span>
        </p>

        <div class="section">
          <h3>Summary</h3>
          <div style="padding: 10px 12px">
            <p class="text">$summary</p>
          </div>
        </div>

        <div class="section">
          <h3>Description</h3>
          <div style="padding: 10px 12px">
            <p class="text">$description</p>
          </div>
        </div>

        <div class="section">
          <h3>Details</h3>
          <table>
            $details_rows_html
          </table>
        </div>

        <div class="section" style="$context_section_style">
          <h3>Context</h3>
          <table>
            $context_rows_html
          </table>
        </div>

        <div class="section" style="$labels_section_style">
          <h3>Labels</h3>
          <table>
            $labels_rows_html
          </table>
        </div>
      </div>
      <div class="footer">This message was generated by Watchdog AlertManager.</div>
    </div>
  </body>
</html>
